---
layout: default
---

<main>
    <article class="article">
        <div class="post-title">
            <h1>{{ page.title }}</h1>
            <div class="publication-meta">
                <div class="publication-authors">{{ page.authors }}</div>
                <div class="publication-venue">{{ page.venue }} ({{ page.year }})</div>
            </div>
        </div>

        {% if page.thumbnail %}
        <div class="title-image">
            <img src="{{ page.thumbnail }}" alt="{{ page.title }}">
        </div>
        {% endif %}

        <div class="publication-links">
            {% if page.doi %}
            <a href="https://doi.org/{{ page.doi }}" target="_blank" rel="noopener">
                <img src="https://img.shields.io/badge/DOI-{{ page.doi | replace: '-', '--' | replace: '/', '%2F' }}-blue" alt="DOI {{ page.doi }}">
            </a>
            {% endif %}

            {% if page.external_url %}
            <a href="{{ page.external_url }}" target="_blank" rel="noopener">
                <img src="https://img.shields.io/badge/paper-link-blue" alt="Paper link">
            </a>
            {% endif %}

            {% if page.pdf %}
            <a href="{{ site.baseurl }}{{ page.pdf }}" target="_blank" rel="noopener">
                <img src="https://img.shields.io/badge/PDF-document-red" alt="PDF">
            </a>
            {% endif %}
        </div>

        <div class="post-text" style="margin-top: 1rem !important;">
            {{ content }}
        </div>
    </article>
</main>

<div class="back-to-publications">
    <a href="{{ site.baseurl }}/publications/">← Back to publications</a>
</div>
